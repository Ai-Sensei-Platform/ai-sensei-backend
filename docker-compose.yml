# Local development dependency for the backend: PostgreSQL.
# Object storage uses real AWS S3 (configure S3_* in .env).
# Start with: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tutor
      POSTGRES_PASSWORD: tutor
      POSTGRES_DB: ai_voice_tutor
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutor -d ai_voice_tutor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
